<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>记忆回收者 - 独立调试版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #fff;
        }
        
        h1 {
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255,200,100,0.5);
        }
        
        .container {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 1400px;
        }
        
        .panel {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            min-width: 300px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .panel h2 {
            margin-bottom: 15px;
            font-size: 18px;
            color: #ffd700;
        }
        
        #game-canvas {
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        
        .card-demo {
            width: 200px;
            height: 300px;
            background: linear-gradient(135deg, #2a2a4a 0%, #1a1a3a 100%);
            border-radius: 15px;
            border: 3px solid #ffd700;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .card-demo:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 60px rgba(255,215,0,0.3);
        }
        
        .card-demo::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent 30%,
                rgba(255,255,255,0.1) 50%,
                transparent 70%
            );
            transform: rotate(45deg);
            transition: transform 0.6s;
        }
        
        .card-demo:hover::before {
            transform: rotate(45deg) translate(50%, 50%);
        }
        
        .card-rarity {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #ffd700;
            color: #000;
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 12px;
        }
        
        .card-element {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        
        .card-name {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .card-stats {
            display: flex;
            gap: 15px;
            font-size: 14px;
        }
        
        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
        }
        
        .stat-label {
            font-size: 10px;
            opacity: 0.7;
        }
        
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(102,126,234,0.4);
        }
        
        .log-panel {
            height: 200px;
            overflow-y: auto;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            padding: 10px;
            font-family: monospace;
            font-size: 12px;
        }
        
        .log-entry {
            margin-bottom: 5px;
            padding: 3px 5px;
            border-left: 3px solid #667eea;
            padding-left: 10px;
        }
        
        .damage-test {
            margin-top: 20px;
        }
        
        .damage-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
        }
        
        .vs {
            font-weight: bold;
            color: #ffd700;
        }
        
        .result {
            margin-left: auto;
            padding: 5px 15px;
            background: rgba(255,215,0,0.2);
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>🔮 记忆回收者 - 独立调试版</h1>
    
    <div class="container">
        <!-- 左侧：游戏画布 -->
        <div class="panel">
            <h2>🎮 游戏画面</h2>
            <canvas id="game-canvas" width="360" height="640"></canvas>
            <div class="controls">
                <button onclick="game.spawnCard()">生成卡牌</button>
                <button onclick="game.battle()">模拟战斗</button>
                <button onclick="game.clear()">清空</button>
            </div>
        </div>
        
        <!-- 中间：卡牌展示 -->
        <div class="panel">
            <h2>🃏 卡牌预览</h2>
            <div id="card-container" style="display: flex; flex-direction: column; gap: 15px;">
                <div class="card-demo" style="border-color: #ff6b6b;">
                    <span class="card-rarity">SSR</span>
                    <span class="card-element" style="background: #ff6b6b;">🔥</span>
                    <div class="card-name">烬羽</div>
                    <div class="card-stats">
                        <div class="stat">
                            <span class="stat-value">850</span>
                            <span class="stat-label">ATK</span>
                        </div>
                        <div class="stat">
                            <span class="stat-value">3200</span>
                            <span class="stat-label">HP</span>
                        </div>
                    </div>
                </div>
                
                <div class="card-demo" style="border-color: #4ecdc4;">
                    <span class="card-rarity">SR</span>
                    <span class="card-element" style="background: #4ecdc4;">💧</span>
                    <div class="card-name">青漪</div>
                    <div class="card-stats">
                        <div class="stat">
                            <span class="stat-value">520</span>
                            <span class="stat-label">ATK</span>
                        </div>
                        <div class="stat">
                            <span class="stat-value">2800</span>
                            <span class="stat-label">HP</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 右侧：战斗测试 -->
        <div class="panel">
            <h2>⚔️ 战斗系统测试</h2>
            
            <div class="damage-test">
                <div class="damage-row">
                    <span>🔥火 (100攻)</span>
                    <span class="vs">VS</span>
                    <span>🌿木 (50防)</span>
                    <span class="result" id="result-1">点击测试</span>
                </div>
                <div class="damage-row">
                    <span>🌿木 (100攻)</span>
                    <span class="vs">VS</span>
                    <span>⚔️金 (50防)</span>
                    <span class="result" id="result-2">点击测试</span>
                </div>
                <div class="damage-row">
                    <span>💧水 (100攻)</span>
                    <span class="vs">VS</span>
                    <span>🔥火 (50防)</span>
                    <span class="result" id="result-3">点击测试</span>
                </div>
            </div>
            
            <div class="controls">
                <button onclick="runDamageTests()">运行伤害测试</button>
                <button onclick="clearResults()">清除结果</button>
            </div>
        </div>
        
        <!-- 底部：日志 -->
        <div class="panel" style="width: 100%; max-width: 1200px;">
            <h2>📝 调试日志</h2>
            <div id="log-panel" class="log-panel">
                <div class="log-entry">调试页面已加载，等待操作... (免Cocos Creator方案)</div>
            </div>
            <div class="controls">
                <button onclick="clearLog()">清空日志</button>
                <button onclick="exportLog()">导出日志</button>
            </div>
        </div>
    </div>
    
    <script>
        // 引入测试用的战斗系统
        const battleSystem = {
            elementCounter: {
                'fire': 'metal',
                'metal': 'wood',
                'wood': 'earth',
                'earth': 'water',
                'water': 'fire',
                'light': 'dark',
                'dark': 'light'
            },
            
            calculateDamage(attacker, defender) {
                let multiplier = 1.0;
                
                if (this.elementCounter[attacker.element] === defender.element) {
                    multiplier = 1.3;
                } else if (this.elementCounter[defender.element] === attacker.element) {
                    multiplier = 0.7;
                }
                
                const baseDamage = Math.max(1, attacker.atk - defender.def * 0.5);
                return Math.floor(baseDamage * multiplier);
            }
        };
        
        // 日志系统
        function log(message) {
            const panel = document.getElementById('log-panel');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            panel.appendChild(entry);
            panel.scrollTop = panel.scrollHeight;
        }
        
        function clearLog() {
            document.getElementById('log-panel').innerHTML = '';
        }
        
        function exportLog() {
            const logs = Array.from(document.querySelectorAll('.log-entry'))
                .map(e => e.textContent)
                .join('\n');
            const blob = new Blob([logs], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'debug-log.txt';
            a.click();
        }
        
        // 伤害测试
        function runDamageTests() {
            log('开始运行伤害计算测试...');
            
            const tests = [
                { id: 'result-1', attacker: {atk: 100, element: 'fire'}, defender: {def: 50, element: 'metal'} },
                { id: 'result-2', attacker: {atk: 100, element: 'wood'}, defender: {def: 50, element: 'metal'} },
                { id: 'result-3', attacker: {atk: 100, element: 'water'}, defender: {def: 50, element: 'fire'} }
            ];
            
            tests.forEach(test => {
                const damage = battleSystem.calculateDamage(test.attacker, test.defender);
                document.getElementById(test.id).textContent = `💥 ${damage} 伤害`;
                log(`伤害计算: ${test.attacker.element} -> ${test.defender.element} = ${damage}`);
            });
            
            log('测试完成!');
        }
        
        function clearResults() {
            ['result-1', 'result-2', 'result-3'].forEach(id => {
                document.getElementById(id).textContent = '点击测试';
            });
        }
        
        // 游戏模拟
        const game = {
            canvas: document.getElementById('game-canvas'),
            ctx: null,
            cards: [],
            
            init() {
                this.ctx = this.canvas.getContext('2d');
                this.draw();
                log('游戏画布初始化完成');
            },
            
            draw() {
                const ctx = this.ctx;
                
                // 清空画布
                ctx.fillStyle = '#1a1a2e';
                ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                // 绘制网格背景
                ctx.strokeStyle = 'rgba(255,255,255,0.05)';
                ctx.lineWidth = 1;
                for (let i = 0; i < this.canvas.width; i += 40) {
                    ctx.beginPath();
                    ctx.moveTo(i, 0);
                    ctx.lineTo(i, this.canvas.height);
                    ctx.stroke();
                }
                for (let i = 0; i < this.canvas.height; i += 40) {
                    ctx.beginPath();
                    ctx.moveTo(0, i);
                    ctx.lineTo(this.canvas.width, i);
                    ctx.stroke();
                }
                
                // 绘制标题
                ctx.fillStyle = '#ffd700';
                ctx.font = 'bold 24px Microsoft YaHei';
                ctx.textAlign = 'center';
                ctx.fillText('记忆回收者', this.canvas.width / 2, 40);
                
                // 绘制状态
                ctx.fillStyle = '#aaa';
                ctx.font = '14px Microsoft YaHei';
                ctx.fillText(`场上卡牌: ${this.cards.length}`, this.canvas.width / 2, 70);
                
                // 绘制提示
                ctx.fillStyle = '#666';
                ctx.font = '12px Microsoft YaHei';
                ctx.fillText('点击按钮生成卡牌', this.canvas.width / 2, this.canvas.height - 20);
            },
            
            spawnCard() {
                this.cards.push({
                    id: this.cards.length,
                    element: ['fire', 'water', 'wood', 'metal', 'earth'][Math.floor(Math.random() * 5)],
                    rarity: ['N', 'R', 'SR', 'SSR'][Math.floor(Math.random() * 4)]
                });
                log(`生成卡牌 #${this.cards.length}: ${this.cards[this.cards.length-1].element} ${this.cards[this.cards.length-1].rarity}`);
                this.draw();
            },
            
            battle() {
                if (this.cards.length < 2) {
                    log('⚠️ 需要至少2张卡牌才能战斗');
                    return;
                }
                const card1 = this.cards[Math.floor(Math.random() * this.cards.length)];
                const card2 = this.cards[Math.floor(Math.random() * this.cards.length)];
                if (card1 !== card2) {
                    log(`⚔️ 战斗: ${card1.element} vs ${card2.element}`);
                }
            },
            
            clear() {
                this.cards = [];
                log('清空场上所有卡牌');
                this.draw();
            }
        };
        
        // 初始化
        window.onload = () => {
            game.init();
            log('✅ 独立调试页面加载完成 (无需Cocos Creator)');
        };
    </script>
</body>
</html>
