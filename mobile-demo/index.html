<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>记忆回收者 - 手机试玩版 v0.2</title>
    <script src="card-data.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f1a; min-height: 100vh; display: flex; flex-direction: column; color: #fff; }
        .header { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 15px; text-align: center; border-bottom: 2px solid #ffd700; position: sticky; top: 0; z-index: 100; }
        .header h1 { font-size: 20px; color: #ffd700; }
        .header .subtitle { font-size: 12px; color: #888; margin-top: 5px; }
        .game-container { flex: 1; padding: 10px; max-width: 480px; margin: 0 auto; width: 100%; }
        .section { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid rgba(255,215,0,0.2); }
        .section-title { font-size: 16px; color: #ffd700; margin-bottom: 12px; }
        .card-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .card { aspect-ratio: 2/3; background: linear-gradient(135deg, #2a2a4a, #1a1a3a); border-radius: 8px; border: 2px solid; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 8px; cursor: pointer; }
        .card.N { border-color: #888; } .card.R { border-color: #4a9eff; } .card.SR { border-color: #a855f7; } .card.SSR { border-color: #ffd700; }
        .btn { background: linear-gradient(135deg, #667eea, #764ba2); border: none; border-radius: 25px; color: #fff; padding: 12px; font-size: 14px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 10px; }
        .btn-secondary { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,215,0,0.3); }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; text-align: center; }
        .stat-item { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; }
        .stat-value { font-size: 20px; font-weight: bold; color: #ffd700; }
        .battle-log { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 10px; max-height: 150px; overflow-y: auto; font-size: 12px; }
        .hidden { display: none !important; }
        #battle-screen { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #0f0f1a; z-index: 200; padding: 15px; }
        .enemy-area { text-align: center; padding: 20px; background: rgba(255,0,0,0.1); border-radius: 12px; border: 2px solid #ff4444; margin-bottom: 15px; }
        .player-area { text-align: center; padding: 15px; background: rgba(0,255,0,0.1); border-radius: 12px; border: 2px solid #44ff44; }
        .hand-cards { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; }
        .hand-card { min-width: 90px; aspect-ratio: 2/3; background: linear-gradient(135deg, #2a2a4a, #1a1a3a); border-radius: 8px; border: 2px solid #ffd700; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
    </style>
</head>
<body>
    <div id="main-menu">
        <div class="header">
            <h1>🔮 记忆回收者</h1>
            <div class="subtitle">v0.2 真实卡牌数据 | 23张卡牌可用</div>
        </div>
        <div class="game-container">
            <div class="section">
                <div class="section-title">👤 我的收藏</div>
                <div class="stats">
                    <div class="stat-item"><div class="stat-value" id="card-count">0</div><div style="font-size:11px;color:#888">卡牌数</div></div>
                    <div class="stat-item"><div class="stat-value" id="gold">1000</div><div style="font-size:11px;color:#888">金币</div></div>
                    <div class="stat-item"><div class="stat-value" id="diamond">50</div><div style="font-size:11px;color:#888">钻石</div></div>
                </div>
            </div>
            
            <button class="btn" onclick="startBattle()">⚔️ 开始战斗</button>
            <button class="btn btn-secondary" onclick="drawCard()">🎴 抽卡 (100金币)</button>
            <button class="btn btn-secondary" onclick="showCollection()">📚 查看收藏</button>
            
            <div class="section" id="recent-section" style="display:none;">
                <div class="section-title">🎁 最近获得</div>
                <div class="card-grid" id="recent-cards"></div>
            </div>
            
            <div class="section">
                <div class="section-title">📜 战斗记录</div>
                <div class="battle-log" id="battle-log"
></div>
            </div>
        </div>
    </div>
    
    <div id="battle-screen" class="hidden">
        <div style="background:#1a1a2e;padding:15px;text-align:center;border-bottom:2px solid #ffd700;">
            <h2>⚔️ 战斗中</h2>
        </div>
        
        <div class="game-container">
            <div class="enemy-area">
                <div style="font-size:48px;">👹</div>
                <div>记忆守卫 Lv.1</div>
                <div class="enemy-hp-bar"><div class="enemy-hp-fill" id="enemy-hp" style="width:100%"></div></div>
                <div id="enemy-hp-text">500/500</div>
            </div>
            
            <div class="player-area">
                <div id="turn-indicator">我的回合 - 选择卡牌攻击!</div>
                <div>HP: <span id="player-hp">300</span>/300</div>
            </div>
            
            <div class="hand-cards" id="hand-cards"
></div>
            
            <button class="btn" onclick="endTurn()">结束回合</button>
            <button class="btn btn-secondary" onclick="fleeBattle()">逃跑</button>
        </div>
    </div>
    
    <script>
        let playerData = { cards: [], gold: 1000, diamond: 50, recentCards: [] };
        let battleState = { enemyHp: 500, enemyMaxHp: 500, playerHp: 300, playerMaxHp: 300, hand: [], turn: 1 };
        
        function drawCard() {
            if (playerData.gold < 100) { log('金币不足！'); return; }
            playerData.gold -= 100;
            const card = drawCardFromDatabase();
            playerData.cards.push(card);
            playerData.recentCards.unshift(card);
            if (playerData.recentCards.length > 6) playerData.recentCards.pop();
            updateUI();
            showRecentCards();
            log(`获得 [${card.rarity}] ${card.name} ${card.icon} (ATK:${card.atk})`);
        }
        
        function showRecentCards() {
            const container = document.getElementById('recent-cards');
            const section = document.getElementById('recent-section');
            if (playerData.recentCards.length === 0) { section.style.display = 'none'; return; }
            section.style.display = 'block';
            container.innerHTML = playerData.recentCards.map(card => `
                <div class="card ${card.rarity}">
                    <span class="card-rarity" style="color:${getElementColor(card.element)}">${card.rarity}</span>
                    <div style="font-size:24px;">${card.icon}</div>
                    <div style="font-size:10px;">${card.name}</div>
                    <div style="font-size:10px;color:#888;">ATK:${card.atk}</div>
                </div>
            `).join('');
        }
        
        function getElementColor(element) {
            const colors = { fire: '#ff6b6b', water: '#4ecdc4', wood: '#95e1d3', metal: '#c0c0c0', earth: '#d4a574', light: '#ffd700', dark: '#8b7dd4' };
            return colors[element] || '#fff';
        }
        
        function startBattle() {
            if (playerData.cards.length < 3) { alert('需要至少3张卡牌！请先抽卡。'); return; }
            const shuffled = [...playerData.cards].sort(() => Math.random() - 0.5);
            battleState.hand = shuffled.slice(0, 3);
            battleState.enemyHp = 500; battleState.playerHp = 300; battleState.turn = 1;
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('battle-screen').classList.remove('hidden');
            updateBattleUI();
            log('=== 战斗开始！ ===');
        }
        
        function updateBattleUI() {
            document.getElementById('enemy-hp').style.width = (battleState.enemyHp/battleState.enemyMaxHp*100) + '%';
            document.getElementById('enemy-hp-text').textContent = `${battleState.enemyHp}/${battleState.enemyMaxHp}`;
            document.getElementById('player-hp').textContent = battleState.playerHp;
            const handContainer = document.getElementById('hand-cards');
            handContainer.innerHTML = battleState.hand.map((card, index) => `
                <div class="hand-card" onclick="playCard(${index})" style="border-color:${getElementColor(card.element)}">
                    <div style="font-size:20px;">${card.icon}</div>
                    <div style="font-size:10px;">${card.name}</div>
                    <div style="font-size:12px;color:#ffd700;">ATK:${card.atk}</div>
                    <div style="font-size:10px;color:#888;">${ELEMENT_COUNTER[card.element] ? '克:' + ELEMENT_COUNTER[card.element] : ''}</div>
                </div>
            `).join('');
        }
        
        function playCard(index) {
            const card = battleState.hand[index];
            if (!card) return;
            const isCounter = ELEMENT_COUNTER[card.element] === 'dark'; // 敌人假设为暗属性
            let damage = calculateDamage(card, { def: 100 }, Math.random() < card.crit/100);
            if (isCounter) damage = Math.floor(damage * 1.3);
            battleState.enemyHp = Math.max(0, battleState.enemyHp - damage);
            battleState.hand.splice(index, 1);
            updateBattleUI();
            log(`${card.name} 造成 ${damage} 伤害${isCounter ? ' (克制!)' : ''}`);
            if (battleState.enemyHp <= 0) {
                setTimeout(() => { alert('胜利！获得100金币'); playerData.gold += 100; fleeBattle(); }, 500);
                return;
            }
            setTimeout(enemyAttack, 500);
        }
        
        function enemyAttack() {
            const damage = Math.floor(Math.random() * 30) + 20;
            battleState.playerHp = Math.max(0, battleState.playerHp - damage);
            log(`敌人造成 ${damage} 伤害!`);
            updateBattleUI();
            if (battleState.playerHp <= 0) { setTimeout(() => { alert('战斗失败...'); fleeBattle(); }, 500); }
        }
        
        function endTurn() {
            if (battleState.hand.length < 3 && playerData.cards.length > battleState.hand.length) {
                const available = playerData.cards.filter(c => !battleState.hand.includes(c));
                if (available.length > 0) {
                    battleState.hand.push(available[Math.floor(Math.random() * available.length)]);
                    log('补充手牌');
                }
            }
            battleState.turn++;
            enemyAttack();
            updateBattleUI();
        }
        
        function fleeBattle() {
            document.getElementById('battle-screen').classList.add('hidden');
            document.getElementById('main-menu').classList.remove('hidden');
            updateUI();
        }
        
        function showCollection() {
            if (playerData.cards.length === 0) { alert('还没有卡牌，快去抽卡吧！'); return; }
            const list = playerData.cards.slice(0, 10).map(c => `[${c.rarity}]${c.name} ATK:${c.atk}`).join('\n');
            alert(`收藏夹共 ${playerData.cards.length} 张:\n${list}${playerData.cards.length > 10 ? '\n...' : ''}`);
        }
        
        function updateUI() {
            document.getElementById('card-count').textContent = playerData.cards.length;
            document.getElementById('gold').textContent = playerData.gold;
            document.getElementById('diamond').textContent = playerData.diamond;
        }
        
        function log(msg) {
            const logDiv = document.getElementById('battle-log');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.textContent = msg;
            logDiv.insertBefore(entry, logDiv.firstChild);
        }
        
        updateUI();
        log('欢迎来到记忆回收者 v0.2！\n现在使用真实卡牌数据（23张卡牌）');
    </script>
</body>
</html>
