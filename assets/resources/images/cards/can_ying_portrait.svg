<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#2D3436"/>
            <stop offset="100%" style="stop-color:#6C5CE7"/>
        </linearGradient>
        <filter id="glow">
            <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    
    <!-- 背景 -->
    <rect width="100%" height="100%" fill="url(#bg)"/>
    
    <!-- 装饰性元素 -->
    <circle cx="256" cy="170.66666666666666" r="128" 
            fill="none" stroke="#6C5CE7" stroke-width="3" opacity="0.3"/>
    
    <!-- 角色占位符 - 剪影 -->
    <ellipse cx="256" cy="256" rx="170.66666666666666" ry="170.66666666666666"
             fill="#6C5CE7" opacity="0.4" filter="url(#glow)"/>
    
    <!-- 文字 -->
    <text x="256" y="256" 
          font-family="Arial, sans-serif" font-size="64" 
          fill="white" text-anchor="middle" dominant-baseline="middle">
        残影
    </text>
    <text x="256" y="341.3333333333333" 
          font-family="Arial, sans-serif" font-size="32" 
          fill="#6C5CE7" text-anchor="middle" opacity="0.8">
        头像占位图
    </text>
    <text x="256" y="462" 
          font-family="Arial, sans-serif" font-size="24" 
          fill="white" text-anchor="middle" opacity="0.5">
        DARK | can_ying
    </text>
    
    <!-- 边框 -->
    <rect x="10" y="10" width="492" height="492"
          fill="none" stroke="#6C5CE7" stroke-width="5" opacity="0.5"/>
</svg>