<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1820" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#2D3436"/>
            <stop offset="100%" style="stop-color:#FFD93D"/>
        </linearGradient>
        <filter id="glow">
            <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    
    <!-- 背景 -->
    <rect width="100%" height="100%" fill="url(#bg)"/>
    
    <!-- 装饰性元素 -->
    <circle cx="512" cy="606.6666666666666" r="256" 
            fill="none" stroke="#FFD93D" stroke-width="3" opacity="0.3"/>
    
    <!-- 角色占位符 - 剪影 -->
    <ellipse cx="512" cy="910" rx="341.3333333333333" ry="606.6666666666666"
             fill="#FFD93D" opacity="0.4" filter="url(#glow)"/>
    
    <!-- 文字 -->
    <text x="512" y="910" 
          font-family="Arial, sans-serif" font-size="128" 
          fill="white" text-anchor="middle" dominant-baseline="middle">
        明烛
    </text>
    <text x="512" y="1080.6666666666667" 
          font-family="Arial, sans-serif" font-size="64" 
          fill="#FFD93D" text-anchor="middle" opacity="0.8">
        全身占位图
    </text>
    <text x="512" y="1770" 
          font-family="Arial, sans-serif" font-size="24" 
          fill="white" text-anchor="middle" opacity="0.5">
        LIGHT | ming_zhu
    </text>
    
    <!-- 边框 -->
    <rect x="10" y="10" width="1004" height="1800"
          fill="none" stroke="#FFD93D" stroke-width="5" opacity="0.5"/>
</svg>