<?xml version="1.0" encoding="UTF-8"?>
<svg width="256" height="256" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <radialGradient id="skillBg" cx="50%" cy="50%" r="50%">
            <stop offset="0%" style="stop-color:#2D3436"/>
            <stop offset="100%" style="stop-color:#C0392B"/>
        </radialGradient>
        <filter id="iconGlow">
            <feGaussianBlur stdDeviation="3"/>
        </filter>
    </defs>
    
    <!-- 背景圆 -->
    <circle cx="128" cy="128" r="120" fill="url(#skillBg)"/>
    
    <!-- 发光圆环 -->
    <circle cx="128" cy="128" r="110" fill="none" stroke="#C0392B" stroke-width="4" opacity="0.6"/>
    <circle cx="128" cy="128" r="100" fill="none" stroke="#C0392B" stroke-width="2" opacity="0.3"/>
    
    <!-- 技能符号 -->
    <text x="128" y="138" font-family="Arial, sans-serif" font-size="60" 
          fill="white" text-anchor="middle" font-weight="bold">
        红
    </text>
    
    <!-- 装饰点 -->
    <circle cx="128" cy="60" r="8" fill="#C0392B"/>
    <circle cx="128" cy="196" r="8" fill="#C0392B"/>
    <circle cx="60" cy="128" r="8" fill="#C0392B"/>
    <circle cx="196" cy="128" r="8" fill="#C0392B"/>
</svg>